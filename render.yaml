# Render Blueprint — deploys this folder as a free Python web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: elderly-healthcare-predictor
    runtime: python
    plan: free
    region: singapore          # closest region to Malaysia; change if you prefer
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
